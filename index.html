<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>E-Commerce UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <h2 class="logo">ShopEasy</h2>

  <input type="text" placeholder="Search products..." class="search">

  <div class="cart-box" onclick="goToCart()">
    🛒 Cart <span id="cart-count">0</span>
  </div>

  <div class="cart-box" onclick="goToWishlist()">
  ❤️ Wishlist <span id="wishlist-count">0</span>
</div>
</nav>

<!-- Banner -->
<section class="banner">
  <h1>Big Sale 🔥</h1>
  <p>Up to 50% off on all products</p>
</section>

<section class="filters">
  <button onclick="filterCategory('all')">All</button>
  <button onclick="filterCategory('electronics')">Electronics</button>
  <button onclick="filterCategory('fashion')">Fashion</button>
  <button onclick="filterCategory('home')">Home</button>
  <button onclick="filterCategory('beauty')">Beauty</button>
</section>

<!-- Products -->
<section class="products" id="products"></section>

<script src="script.js"></script>
</body>
</html>
